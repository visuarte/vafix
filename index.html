<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAFIX — Planificación FX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d0d0d;color:#e0e0e0;padding:16px;min-height:100vh}
h1{font-size:1.1rem;font-weight:600;color:#c0c0c0;margin-bottom:4px}
.sub{font-size:.8rem;color:#888;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
.card{background:#1a1a1a;border-radius:10px;padding:14px;cursor:pointer;border:1px solid #2a2a2a;transition:.15s}
.card:active{transform:scale(.97)}
.card .num{font-size:.7rem;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card .num .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.card .nom{font-size:.85rem;font-weight:500;line-height:1.3;color:#fff}
.card .tag{font-size:.65rem;margin-top:6px;padding:2px 8px;border-radius:4px;display:inline-block}

.critico .num .dot{background:#ff4444}
.critico .tag{background:#ff444422;color:#ff6666}
.aviso .num .dot{background:#ffaa00}
.aviso .tag{background:#ffaa0022;color:#ffcc44}
.ok .num .dot{background:#22cc66}
.ok .tag{background:#22cc6622;color:#44ee88}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000000aa;z-index:100;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;margin:0 auto;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:1rem;margin-bottom:4px;color:#fff}
.modal .meta{font-size:.75rem;color:#888;margin-bottom:16px}
.layer{margin-bottom:12px}
.layer h3{font-size:.8rem;font-weight:600;margin-bottom:4px;padding:4px 8px;border-radius:4px;display:inline-block}
.layer-fx h3{background:#ff444422;color:#ff6666}
.layer-svfx h3{background:#4488ff22;color:#66aaff}
.layer-luz h3{background:#ffaa0022;color:#ffcc44}
.layer ul{list-style:none;font-size:.8rem;color:#bbb;padding-left:4px}
.layer li{padding:2px 0;padding-left:12px;position:relative}
.layer li::before{content:"·";position:absolute;left:0;color:#555}
.notas{font-size:.78rem;color:#999;padding:8px;background:#222;border-radius:6px;margin-top:8px}
.notas strong{color:#ffaa44}
.timeline{background:#111;border-radius:8px;padding:12px;margin-top:12px;overflow-x:auto}
.tl-title{font-size:.7rem;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.tl-row{display:flex;align-items:center;margin-bottom:4px;height:24px;position:relative;min-width:200px}
.tl-label{width:44px;font-size:.65rem;font-weight:600;flex-shrink:0}
.tl-track{flex:1;height:16px;background:#1a1a1a;border-radius:4px;position:relative;overflow:hidden}
.tl-bar{position:absolute;height:16px;border-radius:3px;top:0;min-width:2px}
.tl-bar.fx{background:#ff4444}
.tl-bar.svfx{background:#4488ff}
.tl-bar.luz{background:#ffaa00}
.tl-sync{position:absolute;width:2px;background:#fff;top:-2px;bottom:-2px;z-index:2}
.tl-sync::after{content:"\26a0";position:absolute;top:-14px;left:-6px;font-size:10px;color:#ff4444}
.tl-device{font-size:.65rem;color:#666;margin-top:2px;padding-left:44px}
.tl-device span{margin-right:12px}
.tl-device .d-fx{color:#ff6666}
.tl-device .d-svfx{color:#66aaff}
.tl-device .d-luz{color:#ffcc44}
.critico-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:600;margin-bottom:12px}
.critico-badge.red{background:#ff444433;color:#ff6666;border:1px solid #ff444455}
.critico-badge.yellow{background:#ffaa0033;color:#ffcc44;border:1px solid #ffaa0055}
.close-btn{display:block;width:100%;padding:12px;background:#2a2a2a;border:none;color:#fff;font-size:.9rem;border-radius:8px;cursor:pointer;margin-top:12px;text-align:center}
.close-btn:active{background:#333}

@media(min-width:480px){.grid{grid-template-columns:1fr 1fr 1fr;gap:12px}}
@media(min-width:700px){.grid{grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
body{padding:24px} h1{font-size:1.3rem}}
</style>
</head>
<body>

<h1>VAFIX</h1>
<div class="sub">StuG III vs T-34 · <span id="total"></span></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const DATA = {"proyecto": "StuG III vs T-34", "cliente": "Santiago Espin Canovas", "reunion": "Lunes - reunion VFX", "total": 10, "vignetas": [{"id": "da204fec1bb6", "numero": 1, "titulo": "Llegada a la cota 65.5", "composicion": "Plano general amplio. StuG avanza desde izquierda al centro. Terreno sovietico irregular.", "fx": ["Polvo orugas", "Barro salpicando", "Niebla ligera", "Vibracion chasis"], "svfx": ["Polvo levantado (refuerzo)", "Niebla atmosferica (extension)", "Vibracion camara"], "luz": ["Luz fria difusa (cielo cubierto)", "Contraste suave", "Sin sol directo"], "notas": "Coordinar polvo fisico + digital. Plantear pre-viz semana 1", "critico": "aviso"}, {"id": "67c19ede1c57", "numero": 2, "titulo": "Posicionamiento en la colina", "composicion": "Plano general lateral. StuG estabilizado. Wittmann asoma con prismaticos.", "fx": ["Humo motor leve", "Suspension ajustandose", "Polvo residual"], "svfx": ["Profundidad atmosferica", "Lens flare tenue", "Contraluz suave (silueta)"], "luz": ["Contraluz que perfila tanque", "Fuente lateral calida simulando atardecer"], "notas": "Croma para silueta? Decidir con VFX. Practico de humo sincronizado", "critico": "ok"}, {"id": "43e7fe8f9344", "numero": 3, "titulo": "Primer avistamiento enemigo", "composicion": "Subjetiva desde visor artillero (Sfl.ZF). Siluetas T-34 entre polvo.", "fx": ["Polvo delantero (capa fina)", "Vibracion mecanica"], "svfx": ["Distorsion lente militar", "Aberracion cromatica leve", "Distorsion calorica", "Retiula desgastada"], "luz": ["Calor radiante desde el suelo", "Neblina calida sobre horizonte"], "notas": "Optica militar real Rblf 36? preguntar. Efecto oasis en post", "critico": "ok"}, {"id": "846c1fd415c6", "numero": 4, "titulo": "Recuento de fuerzas", "composicion": "Panoramica amplia. Dos grupos de T-34. Posible matte digital.", "fx": ["Polvo volumetrico tras tanques", "Vibracion suelo"], "svfx": ["Matte painting fondo", "Polvo digital extension", "18 tanques (digital/miniaturas?)"], "luz": ["Luz filtrandose entre nube polvo", "Gradiente de luz fondo a frente"], "notas": "Decidir: miniaturas o CGI masivo. Polvo fisico marcando capas de profundidad", "critico": "ok"}, {"id": "676671d2c5b4", "numero": 5, "titulo": "Ocultamiento en la ladera", "composicion": "Plano medio StuG escondiendose. Vegetacion cubriendo casco.", "fx": ["Vegetacion dinamica (diorama)", "Movimiento ramas al paso"], "svfx": ["Sombras volumetricas (refuerzo)", "Sound design motores sovieticos"], "luz": ["Sombras profundas entre arbustos", "Oscurecimiento gradual"], "notas": "Diorama a escala vs real? Transicion iluminacion campo => bosque", "critico": "ok"}, {"id": "839921004d73", "numero": 6, "titulo": "Primer disparo - PUNTO CRITICO", "composicion": "PPP canon StuG disparando. Fogonazo iluminando metal.", "fx": ["Fogonazo volumetrico", "Retroceso violento canon", "Detonacion seca"], "svfx": ["Onda de choque visible", "Reflejo fogonazo en metal", "Impacto T-34 con explosion"], "luz": ["Iluminacion dinamica del fogonazo", "Pico de luz CALIDA sincronizado", "Destello en superficie"], "notas": "CRITICO: sincronizar fogonazo fisico + luz + VFX. Define el realismo de toda la escena", "critico": "critico"}, {"id": "430eabddc09a", "numero": 7, "titulo": "Impacto", "composicion": "PL T-34 impacto directo lateral. Explosion envuelve torreta.", "fx": ["Explosion volumetrica fuego+humo", "Fragmentos blindaje", "Polvo onda expansiva"], "svfx": ["Fragmentos (refuerzo)", "Turbulencia humo simulacion fluida", "Iluminacion dinamica fogonazo"], "luz": ["Luz de explosion como fuente principal", "Sombras proyectadas por el fogonazo"], "notas": "Coreografia fragmentos: fisicos pequenos, grandes digitales. Seguridad pirotecnia en set", "critico": "aviso"}, {"id": "a1eadb487678", "numero": 8, "titulo": "Retirada al bosque", "composicion": "Travelling trasero. StuG retrocede a bosque. Humo + niebla.", "fx": ["Polvo orugas", "Vegetacion moviendose", "Humo con niebla"], "svfx": ["Humo residual (extension)", "Niebla bosque volumetrica", "Camara vibracion terreno"], "luz": ["Oscurecimiento progresivo", "Sombras volumetricas entre arboles", "Temperatura color baja"], "notas": "Transicion tonal: campo abierto => bosque cerrado. Niebla como elemento narrativo", "critico": "ok"}, {"id": "83a4135a81dd", "numero": 9, "titulo": "Duelo en el bosque - ESCENA MAS COMPLEJA", "composicion": "Contrapicado entre arboles. T-34 vs StuG disparan simultaneo.", "fx": ["Fogonazos simultaneos", "Chispas fragmentos", "Arboles sacudidos por onda", "Hojas volando"], "svfx": ["Onda expansiva visible", "Chispas refuerzo visual", "Particulas hojas digitales"], "luz": ["Iluminacion estroboscopica arboles", "Luz sincronizada con dos fogonazos", "Sombras multiples"], "notas": "ESCENA MAS COMPLEJA: dos impactos simultaneos, coordinar 2 equipos fx. Luz estroboscopica", "critico": "critico"}, {"id": "99aa5926b51b", "numero": 10, "titulo": "Torreta volando", "composicion": "Camara lenta. Torreta T-34 despedida girando. Casco en fuego.", "fx": ["Torreta despedida (efecto fisico)", "Chorro fuego hueco torreta", "Fragmentos secundarios"], "svfx": ["Fisica pesada torreta refuerzo", "Particulas fuego simulacion", "Camara lenta post/overcrinking?"], "luz": ["Resplandor continuo del fuego", "Iluminacion ambiental rojiza", "Sombras danzantes del fuego"], "notas": "Overcrinking vs post: decision con DoP. Efecto torreta: cable o presurizada?", "critico": "ok"}]};
function init(){
  const orden={critico:0,aviso:1,ok:2}
  DATA.vignetas.sort((a,b)=>orden[a.critico]-orden[b.critico]||a.numero-b.numero)
  document.getElementById('total').textContent=DATA.total+' vignetas | '+DATA.cliente
  const grid=document.getElementById('grid')
  DATA.vignetas.forEach(function(v){
    var card=document.createElement('div')
    card.className='card '+v.critico
    var tags={critico:'\u26a0 CRITICO',aviso:'\u26a0 ATENCION',ok:'OK'}
    card.innerHTML='<div class="num"><span class="dot"></span>VIGNETA '+v.numero+'</div>' +
      '<div class="nom">'+v.titulo+'</div>' +
      '<div class="tag">'+(tags[v.critico]||'')+'</div>'
    card.onclick=function(){openModal(v)}
    grid.appendChild(card)
  })
}

function openModal(v){
  const m=document.getElementById('modal')
  const c=document.getElementById('modal-content')
  const tags={critico:'red',aviso:'yellow',ok:''}
  const labels={critico:'⚠ SINCRONIZACIÓN CRÍTICA',aviso:'⚠ REQUIERE ATENCIÓN',ok:''}
  
  let html=`
    <div class="critico-badge ${tags[v.critico]}">${labels[v.critico]||'· SINCRONIZACIÓN ESTÁNDAR ·'}</div>
    <h2>VIÑETA ${v.numero}: ${v.titulo}</h2>
    <div class="meta">${v.composicion||''}</div>
  `
  
  const layers=[
    {key:'fx',label:'F/x (Físicos)',cls:'layer-fx'},
    {key:'svfx',label:'SVfx (Visuales)',cls:'layer-svfx'},
    {key:'luz',label:'Iluminación',cls:'layer-luz'}
  ]
  
  layers.forEach(l=>{
    if(!v[l.key]||!v[l.key].length)return
    html+=`<div class="layer ${l.cls}"><h3>${l.label}</h3><ul>`
    v[l.key].forEach(item=>{html+=`<li>${item}</li>`})
    html+=`</ul></div>`
  })
  
  if(v.notas){
    html+=`<div class="notas"><strong>Notas:</strong> ${v.notas}</div>`
  }

  // Timeline
  if(v.timeline){
    var tl=v.timeline
    html+='<div class="timeline"><div class="tl-title">Sincronizaci\u00f3n (segundos)</div>'
    var tlLayers=[
      {key:'fx',label:'F/x',cls:'fx'},
      {key:'svfx',label:'SVfx',cls:'svfx'},
      {key:'luz',label:'Luz',cls:'luz'}
    ]
    tlLayers.forEach(function(l){
      var t=tl[l.key]
      if(!t)return
      var left=(t.start/tl.total_s*100)
      var width=(t.dur/tl.total_s*100)
      html+='<div class="tl-row">'+
        '<div class="tl-label" style="color:'+({fx:'#ff6666',svfx:'#66aaff',luz:'#ffcc44'})[l.cls]+'">'+l.label+'</div>'+
        '<div class="tl-track">'+
        '<div class="tl-bar '+l.cls+'" style="left:'+left+'%;width:'+width+'%"></div>'
      // Sync points
      if(tl.sync){
        tl.sync.forEach(function(s){
          var sp=(s/tl.total_s*100)
          html+='<div class="tl-sync" style="left:'+sp+'%"></div>'
        })
      }
      html+='</div></div>'
    })
    // Devices
    html+='<div class="tl-device">'
    tlLayers.forEach(function(l){
      var t=tl[l.key]
      if(t&&t.device)html+='<span class="d-'+l.cls+'">'+l.label+': '+t.device+'</span>'
    })
    html+='</div></div>'
  }
  
  html+=`<button class="close-btn" onclick="closeModal()">Cerrar</button>`
  c.innerHTML=html
  m.classList.add('open')
}

function closeModal(){
  document.getElementById('modal').classList.remove('open')
}

document.getElementById('modal').onclick=function(e){
  if(e.target===this)closeModal()
}

init()
</script>
</body>
</html>
